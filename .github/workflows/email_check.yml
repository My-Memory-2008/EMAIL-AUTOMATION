name: Qwen Vision AI Personal Secretary Scanner

on:

  workflow_dispatch:

jobs:
  qwen-vision-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Install TrueType Fonts for Image Rendering
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-dejavu-core

    - name: Initialize Ollama Core
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        sleep 7

    - name: Pull Qwen2.5-VL 3B Model
      run: |
        ollama pull qwen2.5vl:3b

    - name: Set up Runtime Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Canvas & Network Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pillow pytz

    - name: Execute Vision Script
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        PYTHONUNBUFFERED: "1"
      run: python email_scanner.py
